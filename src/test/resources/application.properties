# =====================================================
# TEST CONFIGURATION
# =====================================================

# H2 in-memory database
spring.datasource.url=jdbc:postgresql://136.115.146.17:5432/ticketapp_test_db
spring.datasource.username=ticketapp_user
spring.datasource.password=BGUticketapp1!
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Spring profile
spring.profiles.active=test

# Repository implementation
# DB = Repository Adapters
# MEMORY = InMemory repositories
repository.type=DB

# Initial state
initial.state.enabled=false

# External services disabled for tests
external.payment.enabled=false
external.ticket.enabled=false
external.email.enabled=false

# Logging
logging.level.root=WARN
logging.level.com.ticketing.ticketapp=INFO

# Hikari pool
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=2