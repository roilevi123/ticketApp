# Test Profile Configuration - In-Memory H2 Database
# This configuration ensures tests don't connect to the production database
# or dirty real data with test operations

# H2 In-Memory Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration for Testing
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (optional, helpful for debugging tests)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Connection Pool Settings for Tests
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=2

# Disable unnecessary Spring features for faster tests
spring.jpa.defer-datasource-initialization=true
