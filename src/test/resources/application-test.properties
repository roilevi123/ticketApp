# =====================================================
# TEST PROFILE - PostgreSQL Test Database
# =====================================================

spring.datasource.url=jdbc:postgresql://136.115.146.17:5432/ticketapp_db
spring.datasource.username=ticketapp_user
spring.datasource.password=BGUticketapp1!
spring.datasource.driver-class-name=org.postgresql.Driver

# =====================================================
# JPA / HIBERNATE
# =====================================================

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# =====================================================
# REPOSITORY MODE
# =====================================================

repository.type=DB
# =====================================================
# INITIALIZATION
# =====================================================

initial.state.enabled=false

# =====================================================
# EXTERNAL SERVICES
# =====================================================

external.payment.enabled=false
external.ticket.enabled=false
external.email.enabled=false

# =====================================================
# LOGGING
# =====================================================

logging.level.root=WARN
logging.level.com.ticketing.ticketapp=INFO

# =====================================================
# HIKARI CONNECTION POOL
# =====================================================

spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5