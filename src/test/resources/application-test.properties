#Define that the tests will be using H2 DB, which is in-memory DB
#Also prevent the deletion of the DB between tests of the same process
#The DB is "mocking" a PostgreSQL DB
#This configuration keeps our real DB safe from pollution
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

#Define that each time the tests run, the tables in the DB are clean
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

#Define maximum pool size of 2 - good for robustness tests - seeing how the system handles activity overload and faliure in communication with external systems
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=2

#Disable use in external sysgtes - use mocks instead
external.payment.enabled=false
external.ticket.enabled=false
external.email.enabled=false

logging.level.root=WARN
logging.level.com.ticketing.ticketapp=INFO
initial.state.enabled=false
#spring.profiles.active=test
repository.type=MEMORY
