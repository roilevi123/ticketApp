name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Show test database config
        run: |
          echo "====== application-test.properties ======"
          cat src/test/resources/application-test.properties

      - name: Check PostgreSQL port
        run: |
          timeout 10 bash -c '</dev/tcp/136.115.146.17/5432' && echo "DB reachable" || exit 1

      - name: Build and Test with Maven
        run: mvn -B verify --file pom.xml -e -DforkCount=1 -DreuseForks=false

      - name: Upload JaCoCo Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/